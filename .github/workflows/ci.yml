name: CI
permissions:
  contents: read
on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'
  release:
      types: [published, prereleased, created, edited]
jobs:
  build:
    name: 📦 Builds the Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Compute VERSION and ART_VERSION
        id: meta_build
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          VERSION_SHORT=${VERSION%%-*}
          COMMIT_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ART_VERSION="$VERSION"
          else
            ART_VERSION="${VERSION_SHORT}-${COMMIT_SHORT}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ART_VERSION=$ART_VERSION" >> "$GITHUB_ENV"
      - name: Run tests
        run: SKIP_VENV=1 ./run-tests.sh
      - name: Format
        run: uvx ruff format . --check --diff
      - name: Lint
        run: uvx ruff check --output-format=github .
      - name: Build package
        run: uv build
      - name: Check package metadata
        run: uv run twine check dist/*
      - name: Smoke install wheel
        run: python -m venv /tmp/mkpfs-release-check && /tmp/mkpfs-release-check/bin/python -m pip install dist/*.whl && /tmp/mkpfs-release-check/bin/python -c "import mkpfs; print('mkpfs imported successfully')"
      - name: Prepare wheel artifact name
        shell: bash
        run: |
          mkdir -p dist
          src=$(ls dist/*.whl | head -n1)
          if [ -z "$src" ]; then echo "No wheel found"; exit 1; fi
          base="mkpfs-${ART_VERSION}-py3-none-any.whl"
          cp "$src" "dist/$base"
          echo "WHEEL_NAME=$base" >> "$GITHUB_ENV"

      - name: Store the distribution packages (wheel)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.WHEEL_NAME }}
          path: dist/${{ env.WHEEL_NAME }}

  build-binaries:
    name: 🖥️ Build desktop binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync deps (GUI included in dev group)
        run: uv sync --group dev --frozen

      - name: Compute VERSION and ARCH
        id: meta
        shell: bash
        run: |
          # Read project version from pyproject.toml in a YAML-safe one-liner
          VERSION=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          # Short version (strip off pre-release/build metadata)
          VERSION_SHORT=${VERSION%%-*}
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH_NORM=x64 ;;
            amd64)  ARCH_NORM=x64 ;;
            arm64)  ARCH_NORM=arm64 ;;
            aarch64) ARCH_NORM=arm64 ;;
            *) ARCH_NORM=$ARCH ;;
          esac
          # Short commit id (7 chars)
          COMMIT_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          # Artifact version: use full version for tag builds, otherwise use version_short-commit
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ART_VERSION="$VERSION"
          else
            ART_VERSION="${VERSION_SHORT}-${COMMIT_SHORT}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_SHORT=$VERSION_SHORT" >> "$GITHUB_ENV"
          echo "ARCH=$ARCH_NORM" >> "$GITHUB_ENV"
          echo "COMMIT_SHORT=$COMMIT_SHORT" >> "$GITHUB_ENV"
          echo "ART_VERSION=$ART_VERSION" >> "$GITHUB_ENV"

      - name: Prepare icons (Windows/Linux)
        if: startsWith(matrix.os, 'windows') || startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          mkdir -p dist
          # ensure Pillow present for the Python interpreter used below
          python -m pip install --upgrade Pillow
          # run repository script to generate the icon (avoids heredoc indentation problems)
          python scripts/gen_icon.py

      - name: Prepare icons (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          mkdir -p dist/MkPFS.iconset
          ICONSRC="assets/images/icon.png"
          for SZ in 16 32 64 128 256 512; do
            sips -z "$SZ" "$SZ" "$ICONSRC" --out "dist/MkPFS.iconset/icon_${SZ}x${SZ}.png" >/dev/null
            DBL=$((SZ*2))
            sips -z "$DBL" "$DBL" "$ICONSRC" --out "dist/MkPFS.iconset/icon_${SZ}x${SZ}@2x.png" >/dev/null
          done
          iconutil -c icns "dist/MkPFS.iconset" -o "dist/MkPFS.icns"

      - name: Build Windows onefile GUI
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          uvx pyinstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --name MkPFS \
            --icon dist/icon.ico \
            mkpfs/gui.py
          mv "dist/MkPFS.exe" "dist/mkpfs-${ART_VERSION}-windows-${ARCH}.exe"

      - name: Build macOS app and pkg
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          uvx pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name MkPFS \
            --icon dist/MkPFS.icns \
            --collect-all customtkinter \
            --collect-all PIL \
            --add-data "assets:assets" \
            --hidden-import cryptography \
            mkpfs/gui.py
          # Post-process app bundle Info.plist to set user-friendly display name and version
          PLIST="dist/MkPFS.app/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            # human readable display name
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              DISPLAY_NAME="MkPFS ${VERSION}"
            else
              DISPLAY_NAME="MkPFS ${VERSION_SHORT} (${COMMIT_SHORT})"
            fi
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName \"${DISPLAY_NAME}\"" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string \"${DISPLAY_NAME}\"" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString \"${VERSION_SHORT}\"" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string \"${VERSION_SHORT}\"" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion \"${ART_VERSION}\"" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string \"${ART_VERSION}\"" "$PLIST" || true
          fi
          # create component package then product package so installer shows proper title/version
          pkgbuild \
            --install-location /Applications \
            --component "dist/MkPFS.app" \
            dist/mkpfs-component.pkg
          productbuild --identifier com.psbrew.mkpfs --version "${VERSION_SHORT}" --package dist/mkpfs-component.pkg "dist/mkpfs-${ART_VERSION}-macos-${ARCH}.pkg" || cp dist/mkpfs-component.pkg "dist/mkpfs-${ART_VERSION}-macos-${ARCH}.pkg"
          rm -f dist/mkpfs-component.pkg || true

      - name: Build Linux onefile GUI
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tk
          uvx pyinstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --name MkPFS \
            --icon dist/icon.ico \
            mkpfs/gui.py
          mv "dist/MkPFS" "dist/mkpfs-${ART_VERSION}-linux-${ARCH}"
          # create a tar.gz for linux artifact for easy distribution
          (cd dist && tar -czf "mkpfs-${ART_VERSION}-linux-${ARCH}.tar.gz" "mkpfs-${ART_VERSION}-linux-${ARCH}")
          # create AppDir for AppImage
          APPDIR=dist/MkPFS.AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$APPDIR/usr/share/applications"
          cp "dist/mkpfs-${ART_VERSION}-linux-${ARCH}" "$APPDIR/usr/bin/mkpfs"
          chmod +x "$APPDIR/usr/bin/mkpfs"
          # create a simple desktop file
          printf '%s\n' '[Desktop Entry]' 'Name=MkPFS' 'Exec=mkpfs' 'Icon=mkpfs' 'Type=Application' 'Categories=Utility;' > "$APPDIR/usr/share/applications/mkpfs.desktop"
          # copy icon (convert to png 256x256)
          if [ -f assets/images/icon.png ]; then
            # ensure imagemagick is available to convert the icon
            if ! command -v convert >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y imagemagick || true
            fi
            convert assets/images/icon.png -resize 256x256 "$APPDIR/usr/share/icons/hicolor/256x256/apps/mkpfs.png" || true
          fi
          # download appimagetool and make AppImage
          APPIMAGETOOL=/tmp/appimagetool.AppImage
          if [ ! -f "$APPIMAGETOOL" ]; then
            curl -sL -o "$APPIMAGETOOL" "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" || true
            chmod +x "$APPIMAGETOOL" || true
          fi
          # create an AppRun wrapper
          cat > "$APPDIR/AppRun" <<'AR'
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
export PATH="$HERE/usr/bin:$PATH"
exec "$HERE/usr/bin/mkpfs" "$@"
AR
          chmod +x "$APPDIR/AppRun"

          if [ -x "$APPIMAGETOOL" ]; then
            # create AppImage; output will be created in dist/
            "$APPIMAGETOOL" "$APPDIR" dist/ || true
            # find appimage and rename
            find dist -maxdepth 1 -type f -name "*AppImage" -print0 | while IFS= read -r -d '' f; do mv "$f" "dist/mkpfs-${ART_VERSION}-ubuntu.appimage"; done || true
          else
            echo "appimagetool not available, skipping AppImage creation" >&2
          fi

      - name: Upload Windows executable artifact
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@v6
        with:
          name: mkpfs-${{ env.ART_VERSION }}-windows-${{ env.ARCH }}.exe
          path: |
            dist/mkpfs-${{ env.ART_VERSION }}-windows-*.exe
          if-no-files-found: error

      - name: Upload macOS pkg artifact
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v6
        with:
          name: mkpfs-${{ env.ART_VERSION }}-macos-${{ env.ARCH }}.pkg
          path: |
            dist/mkpfs-${{ env.ART_VERSION }}-macos-*.pkg
          if-no-files-found: error

      - name: Upload Linux tar.gz artifact
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v6
        with:
          name: mkpfs-${{ env.ART_VERSION }}-linux-${{ env.ARCH }}.tar.gz
          path: |
            dist/mkpfs-${{ env.ART_VERSION }}-linux-*.tar.gz
          if-no-files-found: error

      - name: Upload Linux AppImage artifact
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v6
        with:
          name: mkpfs-${{ env.ART_VERSION }}-linux-${{ env.ARCH }}.appimage
          path: |
            dist/mkpfs-${{ env.ART_VERSION }}-ubuntu.appimage
          if-no-files-found: warn

  publish-to-pypi:
    name: 🐍 Publish Python distribution to PyPI
    if: github.event_name == 'release' && github.event.release.prerelease == false
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mkpfs
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  attach-to-release:
    name: 📎 Attach build artifacts to the GitHub Release
    if: github.event_name == 'release'
    needs:
      - build
      - build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts from this workflow
        uses: actions/download-artifact@v6
        with:
          path: release_assets
          merge-multiple: true
      - name: Show artifacts
        run: ls -R release_assets || true
      - name: Upload assets to this Release (by release_id)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ github.event.release.upload_url }}
        run: |
          set -euo pipefail
          ASSETS_DIR=release_assets
          if [ ! -d "$ASSETS_DIR" ] || [ -z "$(find "$ASSETS_DIR" -type f -maxdepth 5 | head -n1)" ]; then
            echo "No artifact files found to upload"
            exit 0
          fi
          BASE_URL=${UPLOAD_URL%%\{*}
          echo "Using upload URL: $BASE_URL"
          while IFS= read -r -d '' f; do
            name=$(basename "$f")
            mime=$(file -b --mime-type "$f" 2>/dev/null || echo application/octet-stream)
            echo "Uploading $name ($mime)"
            http=$(curl -sS -o /tmp/upload_resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: $mime" \
              --data-binary @"$f" \
              "$BASE_URL?name=$name")
            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
              echo "Uploaded $name (HTTP $http)"
            else
              echo "Upload failed for $name (HTTP $http) for file $f"
              sed -e 's/\x1b\[[0-9;]*m//g' -e 's/\r//g' /tmp/upload_resp.json || true
              exit 1
            fi
          done < <(find "$ASSETS_DIR" -type f -print0)
