name: Release Drafter
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter-config.yml # loads '.github/release-drafter-config.yml'
